<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Login - AI-Powered Digital Twin</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <h1 class="login-title">HR Portal</h1>
            <p class="login-subtitle">AI-Powered Digital Twin for Employee Productivity</p>
            
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="Enter your email"
                        required
                    />
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Enter your password"
                        required
                    />
                </div>

                <div id="errorMessage" class="error-message" style="display: none;"></div>

                <button type="submit" class="login-button">
                    Login
                </button>
            </form>

            <div class="demo-credentials">
                <p class="demo-label">Demo Credentials:</p>
                <p>Email: hr@itcompany.com</p>
                <p>Password: hr123</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
